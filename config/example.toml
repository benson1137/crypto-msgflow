# 复制为 config/secrets.toml 并填入真实值

[database]
path = "research.db"

[alerts]
# Telegram bot token (from @BotFather)
telegram_token = ""
# Chat ID to send alerts (get from @userinfobot)
telegram_chat_id = ""

[fred]
api_key = ""  # https://fred.stlouisfed.org/docs/api/api_key.html
series = [
    "WALCL",      # Fed total assets
    "WTREGEN",    # TGA (weekly avg)
    "RRPONTSYD",  # Overnight RRP
    "DGS10",      # 10Y nominal
    "T10YIE",     # 10Y breakeven inflation
    "DFII10",     # 10Y TIPS (real rate)
    "BAMLH0A0HYM2", # High Yield OAS (P0)
]

[okx]
instruments = ["BTC-USDT-SWAP", "ETH-USDT-SWAP"]

[twitter]
# twitterapi.io or similar
api_key = ""
kols = [
    "woonomic",
    "ki_young_ju",
    # add more...
]

[rss]
sources = [
    {name = "coindesk", url = "https://www.coindesk.com/arc/outboundfeeds/rss/"},
    {name = "cointelegraph", url = "https://cointelegraph.com/rss"},
    {name = "theblock", url = "https://www.theblock.co/rss.xml"},
]

[bls]
# api_key optional; registration lifts daily quota 25 → 500
api_key = ""
series = [
    "CUUR0000SA0",      # CPI-U all items
    "CUUR0000SA0L1E",   # Core CPI (less food & energy)
    "LNS14000000",      # Unemployment rate
    "CES0000000001",    # Nonfarm payrolls (total)
    "CES0500000003",    # Avg hourly earnings
]

[bea]
# Watcher (not collector): polls release schedule, alerts on fresh data.
# NOTE: architecture decision pending — see chat.
api_key = ""
releases = []

[proxy]
# Optional: HTTP_PROXY / HTTPS_PROXY for datacenter IP bypass
# http_proxy = "http://127.0.0.1:7890"
# https_proxy = "http://127.0.0.1:7890"
